project:
  name: stock-purpose-screener
  mode: research_only
  no_auto_trading: true

benchmarks:
  market:
    - SPY
    - QQQ
  semis:
    - SMH
  growth:
    - QQQ

momentum_rules:
  min_rs_percentile_for_leader: 90
  min_rs_percentile_for_watch: 75
  reject_if_below_50sma: true
  extended_distance_from_10ema_pct: 10
  extended_distance_from_21ema_pct: 15
  pullback_support_ema:
    - 10
    - 21
  broken_if_below_50sma: true
  broken_if_underperforming_benchmark_days: 20

moving_averages:
  ema:
    - 10
    - 21
  sma:
    - 50
    - 200

returns:
  lookbacks:
    one_month: 21
    three_month: 63
    six_month: 126
    twelve_month: 252

volume_rules:
  avg_volume_window: 20
  breakout_volume_ratio_min: 1.3
  weak_volume_ratio_max: 0.8

risk_rules:
  max_single_position_pct_default: 15
  max_speculative_position_pct: 5
  max_theme_exposure_pct: 40
  high_volatility_atr_pct: 8
  reduce_risk_if_position_exceeds_max: true

portfolio_rules:
  classify_as_concentration_risk_if_position_pct_above: 20
  flag_opportunity_cost_if_underperforms_theme_leader: true
  do_not_add_to_losing_trading_positions: true
  add_only_to_profitable_positions: true

value_rules:
  require_positive_fcf_for_quality_value: true
  max_debt_to_equity_for_quality_value: 2.0
  min_revenue_growth_for_rerating: 0
  require_momentum_confirmation_for_rerating: true
  value_trap_flags:
    - declining_revenue
    - negative_fcf
    - deteriorating_margin
    - high_debt
    - persistent_underperformance

state_labels:
  - Ignore
  - Watch
  - Setup Forming
  - Buyable Area
  - Extended / No Chase
  - Pullback Add Candidate
  - Risk Reduce
  - Broken
  - Review Thesis
